    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "CPU Scheduling Simulator",

        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },

        "educationalLevel": "University",
        "about": {
            "@type": "Thing",
            "name": "CPU Scheduling Algorithms",
            "description": "Algorithms used by operating systems to schedule processes on CPU cores"

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css?v=1">
    <!-- App -->

<body>

    <!-- Suite Navigation -->
    <nav class="suite-nav" aria-label="Suite navigation">
        <a href="https://os.arose-niazi.me/">← OS Suite</a>
    </nav>

    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <h1 class="site-title">CPU Scheduling<span>Simulator</span></h1>
            <div class="header-actions">
                <button id="history-toggle-btn" type="button" aria-label="Toggle history panel">History</button>
                <button id="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="primary-area">

            <!-- Input Card -->
            <section class="card" aria-label="Process input">
                <h2 class="card-title">Process Configuration</h2>

                <!-- Algorithm & Settings -->
                <div class="controls-row">
                    <div class="control-group">
                        <label for="algorithm-select">Algorithm</label>
                        <select id="algorithm-select">
                            <option value="fcfs">FCFS</option>
                            <option value="sjf-np">SJF (Non-Preemptive)</option>
                            <option value="sjf-p">SJF (Preemptive / SRTF)</option>
                            <option value="priority-np">Priority (Non-Preemptive)</option>
                            <option value="priority-p">Priority (Preemptive)</option>
                            <option value="rr">Round Robin</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="cores-input">Cores</label>
                        <input type="number" id="cores-input" min="1" max="16" value="1" class="small-input">
                    </div>

                    <div class="control-group" id="quantum-wrapper">
                        <label for="quantum-input">Quantum</label>
                        <input type="number" id="quantum-input" min="1" max="100" value="2" class="small-input">
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="compare-toggle">
                        <label for="compare-toggle">Compare Mode</label>
                    </div>

                    <div class="control-group" id="compare-method-wrapper">
                        <label for="compare-select">Compare With</label>
                        <select id="compare-select">
                            <option value="fcfs">FCFS</option>
                            <option value="sjf-np">SJF (Non-Preemptive)</option>
                            <option value="sjf-p" selected>SJF (Preemptive / SRTF)</option>
                            <option value="priority-np">Priority (Non-Preemptive)</option>
                            <option value="priority-p">Priority (Preemptive)</option>
                            <option value="rr">Round Robin</option>
                        </select>
                    </div>
                </div>

                <!-- Process Table -->
                <div class="process-table-wrapper">
                    <table class="process-table" id="process-table">
                        <thead>
                            <tr>
                                <th>Label</th>
                                <th>Arrival Time</th>
                                <th>Burst Time</th>
                                <th class="priority-col">Priority</th>
                                <th class="action-col"></th>
                            </tr>
                        </thead>
                        <tbody id="process-tbody">
                        </tbody>
                    </table>
                </div>

                <!-- Action Buttons -->
                <div class="btn-row">
                    <button id="add-process-btn" class="btn btn-secondary" type="button">+ Add Process</button>
                    <button id="random-btn" class="btn btn-secondary" type="button">Random</button>
                    <button id="calculate-btn" class="btn btn-primary" type="button">▶ Simulate</button>
                    <button id="clear-btn" class="btn btn-secondary" type="button">Clear Output</button>
                </div>

                <p class="tip-text">
                    Tip: Press <kbd>Ctrl+Enter</kbd> to simulate. Lower priority number = higher priority.
                </p>
            </section>

            <!-- Output -->
            <section id="output" aria-label="Simulation results"></section>
        </div>

        <!-- History Panel -->
        <aside id="history-panel">
            <div class="card">
                <h2 class="card-title">
                    History
                    <button id="clear-history-btn" class="btn btn-small btn-secondary" type="button">Clear</button>
                </h2>
                <div id="history-list"></div>
            </div>
        </aside>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-inner">

                <a href="https://arose-niazi.me" target="_blank" rel="noopener noreferrer">Author</a>
            </nav>
        </div>
    </footer>

</body>
</html>
